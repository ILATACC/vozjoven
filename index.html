<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voz Joven Morelia 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
/* ============================================================
   VOZ JOVEN MORELIA 2026 — Sistema "Atardecer Morelia"
   ============================================================ */



:root {
  /* — Atardecer Morelia palette — */
  --grape:    oklch(0.40 0.13 305);   /* deep brand purple */
  --purple:   oklch(0.50 0.15 300);   /* morelia brilla purple */
  --magenta:  oklch(0.62 0.21 350);   /* rosa / magenta */
  --coral:    oklch(0.70 0.18 30);    /* coral atardecer */
  --amber:    oklch(0.80 0.15 70);    /* dorado cantera / brilla */
  --gold:     oklch(0.86 0.13 88);

  /* neutrals (warm) */
  --ink:      oklch(0.21 0.035 312);  /* near-black warm */
  --ink-soft: oklch(0.34 0.04 312);
  --mute:     oklch(0.52 0.03 312);
  --cream:    oklch(0.985 0.012 70);  /* warm white */
  --sand:     oklch(0.955 0.018 65);
  --line:     oklch(0.90 0.02 320);

  --radius:   22px;
  --radius-sm: 14px;
  --maxw:     1240px;

  --sunset: linear-gradient(115deg,
              var(--grape) 0%,
              var(--purple) 22%,
              var(--magenta) 52%,
              var(--coral) 80%,
              var(--amber) 100%);

  --shadow-lg: 0 30px 70px -28px oklch(0.40 0.13 305 / 0.45);
  --shadow-md: 0 18px 40px -22px oklch(0.40 0.13 305 / 0.40);
  --shadow-sm: 0 8px 24px -14px oklch(0.40 0.13 305 / 0.30);

  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Hanken Grotesk', system-ui, sans-serif;
  color: var(--ink);
  background: var(--cream);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  line-height: 1.55;
}

h1, h2, h3, h4, .display {
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  line-height: 0.98;
  letter-spacing: -0.02em;
  font-weight: 700;
}

a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; }
img { display: block; max-width: 100%; }

.wrap {
  width: 100%;
  max-width: var(--maxw);
  margin-inline: auto;
  padding-inline: clamp(20px, 4vw, 48px);
}

/* ---------- buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.6em;
  padding: 1em 1.5em;
  border-radius: 100px;
  font-family: 'Hanken Grotesk', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: -0.01em;
  transition: transform .35s var(--ease), box-shadow .35s var(--ease), background .35s var(--ease);
  white-space: nowrap;
}
.btn:hover { transform: translateY(-3px); }
.btn:active { transform: translateY(-1px); }

.btn-primary {
  background: var(--ink);
  color: var(--cream);
  box-shadow: var(--shadow-md);
}
.btn-primary:hover { box-shadow: var(--shadow-lg); }

.btn-sun {
  background: linear-gradient(100deg, var(--coral), var(--amber));
  color: var(--grape);
  box-shadow: 0 16px 34px -16px var(--coral);
}

.btn-ghost {
  background: oklch(1 0 0 / 0.14);
  color: var(--cream);
  border: 1.5px solid oklch(1 0 0 / 0.45);
  backdrop-filter: blur(8px);
}
.btn-ghost:hover { background: oklch(1 0 0 / 0.24); }

.btn-outline {
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--line);
}
.btn-outline:hover { border-color: var(--purple); color: var(--purple); }

/* ---------- pill / eyebrow ---------- */
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 0.55em;
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  white-space: nowrap;
}

.live-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--coral);
  box-shadow: 0 0 0 0 oklch(0.70 0.18 30 / 0.7);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 oklch(0.70 0.18 30 / 0.6); }
  70%  { box-shadow: 0 0 0 12px oklch(0.70 0.18 30 / 0); }
  100% { box-shadow: 0 0 0 0 oklch(0.70 0.18 30 / 0); }
}

/* ---------- 4-point sparkle (brilla motif) ---------- */
.spark {
  position: absolute;
  background: var(--amber);
  -webkit-mask: var(--spark-mask);
  mask: var(--spark-mask);
  --spark-mask: radial-gradient(closest-side at 50% 0,    transparent 70%, #000 70%) top,
                radial-gradient(closest-side at 50% 100%, transparent 70%, #000 70%) bottom;
}

/* fade/rise utility for scroll reveals — transform-only so content is
   never stuck invisible if the animation clock is paused (backgrounded tab) */
.reveal { transform: translateY(28px); transition: transform .8s var(--ease); }
.reveal.in { transform: none; }

@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1; transform: none; transition: none; }
  .live-dot { animation: none; }
}
/* ============================================================
   VOZ JOVEN MORELIA — section styles
   ============================================================ */

@keyframes float { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-16px) rotate(8deg); } }

/* ---------------- NAV ---------------- */
.nav {
  position: fixed; inset: 0 0 auto 0; z-index: 50;
  transition: background .4s var(--ease), box-shadow .4s var(--ease), backdrop-filter .4s var(--ease);
}
.nav__inner { display: flex; align-items: center; justify-content: space-between; height: 76px; }
.nav__brand { display: flex; align-items: center; gap: 12px; }
.nav__logo { width: 44px; height: 44px; object-fit: contain; background: var(--grape); border-radius: 12px; padding: 5px; box-shadow: var(--shadow-sm); transition: box-shadow .4s var(--ease); }
.nav__word { display: flex; flex-direction: column; line-height: 1; color: var(--cream); transition: color .4s var(--ease); }
.nav__word strong { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: 1.12rem; letter-spacing: -0.01em; }
.nav__word em { font-style: normal; font-size: 0.72rem; font-weight: 600; opacity: .8; letter-spacing: 0.06em; text-transform: uppercase; }

.nav__links { display: flex; align-items: center; gap: 30px; }
.nav__links > a { color: var(--cream); font-weight: 600; font-size: 1rem; opacity: .9; transition: opacity .25s, color .4s; }
.nav__links > a:hover { opacity: 1; }
.nav__cta { font-size: 0.95rem !important; padding: 0.7em 1.15em !important; }

.nav--solid { background: oklch(0.985 0.012 70 / 0.88); backdrop-filter: blur(14px); box-shadow: 0 1px 0 var(--line), var(--shadow-sm); }
.nav--solid .nav__logo { box-shadow: var(--shadow-sm); background: var(--grape); }
.nav--solid .nav__word { color: var(--ink); }
.nav--solid .nav__links > a { color: var(--ink-soft); }

.nav__burger { display: none; flex-direction: column; gap: 5px; padding: 8px; }
.nav__burger span { width: 24px; height: 2.5px; background: var(--cream); border-radius: 2px; transition: background .4s; }
.nav--solid .nav__burger span { background: var(--ink); }

/* ---------------- HERO ---------------- */
.hero {
  position: relative; overflow: hidden;
  background: var(--sunset);
  padding: 150px 0 120px;
  isolation: isolate;
}
.hero::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  background:
    radial-gradient(60% 70% at 78% 18%, oklch(0.86 0.13 88 / 0.55), transparent 60%),
    radial-gradient(50% 60% at 10% 90%, oklch(0.40 0.13 305 / 0.55), transparent 60%);
}
.hero__grid { display: grid; grid-template-columns: 1.05fr 0.95fr; gap: clamp(32px, 5vw, 80px); align-items: center; }

.hero__copy { color: var(--cream); }
@media (prefers-reduced-motion: no-preference) {
  .hero__copy > * { animation: rise .9s var(--ease) backwards; }
  .hero__eyebrow { animation-delay: 0s !important; }
  .hero__title { animation-delay: .08s !important; }
  .hero__lead { animation-delay: .18s !important; }
  .hero__cta { animation-delay: .28s !important; }
  .hero__stats { animation-delay: .4s !important; }
}
@keyframes rise { from { transform: translateY(30px); } to { transform: translateY(0); } }

.hero__eyebrow { color: var(--cream); background: oklch(1 0 0 / 0.14); padding: 0.5em 0.95em; border-radius: 100px; border: 1px solid oklch(1 0 0 / 0.3); backdrop-filter: blur(6px); }

.hero__title { font-size: clamp(3.2rem, 8.2vw, 6.6rem); font-weight: 800; margin: 0.4em 0 0; text-shadow: 0 6px 40px oklch(0.30 0.1 305 / 0.35); }
.hero__title-accent { position: relative; display: inline-block; color: var(--gold); }

.hero__lead { font-size: clamp(1.05rem, 1.5vw, 1.3rem); max-width: 30ch; margin-top: 1.1em; color: oklch(1 0 0 / 0.92); }
.hero__lead strong { color: var(--gold); font-weight: 700; }

.hero__cta { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 1.8em; }

.hero__stats { display: grid; grid-template-columns: repeat(4, auto); gap: clamp(18px, 3vw, 40px); margin-top: 2.6em; }
.stat__num { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: clamp(1.7rem, 3vw, 2.5rem); line-height: 1; color: var(--cream); }
.stat__label { font-weight: 700; font-size: 0.92rem; margin-top: 4px; color: oklch(1 0 0 / 0.92); }
.stat__sub { font-size: 0.78rem; color: oklch(1 0 0 / 0.7); }

/* hero media */
.hero__media { position: relative; aspect-ratio: 1 / 1; }
.hero__photo { position: absolute; overflow: hidden; border-radius: 26px; box-shadow: var(--shadow-lg); background: oklch(1 0 0 / 0.1); }
.hero__photo--main { inset: -4% 0 22% 16%; border: 4px solid oklch(1 0 0 / 0.6); transform: rotate(2deg); }
.hero__photo--mini { width: 42%; aspect-ratio: 3/4; left: -2%; bottom: -12%; border: 4px solid oklch(1 0 0 / 0.6); transform: rotate(-5deg); }
.hero__badge {
  position: absolute; top: 6%; right: 2%; z-index: 3;
  display: flex; align-items: center; gap: 10px;
  background: var(--cream); color: var(--grape);
  padding: 12px 16px; border-radius: 16px; box-shadow: var(--shadow-md);
  font-size: 0.86rem; line-height: 1.2; font-weight: 600;
  transform: rotate(3deg);
}
.hero__badge strong { font-family: 'Bricolage Grotesque'; font-size: 1.2rem; }

.hero__aqueduct { position: absolute; left: 0; right: 0; bottom: 0; height: 64px; pointer-events: none; }

/* image-slot defaults so placeholders look intentional */
image-slot { --slot-bg: oklch(1 0 0 / 0.12); }
.hero__photo .hero__img, .map-teaser__viz .hero__img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* ---------------- shared section heads ---------------- */
.sec-head { max-width: 40ch; margin-bottom: 2.6em; }
.sec-head__eye { color: var(--magenta); }
.sec-head__title { font-size: clamp(2.1rem, 4.5vw, 3.4rem); margin: 0.4em 0 0.3em; }
.sec-head__lead { font-size: 1.12rem; color: var(--mute); }
.sec-head--light .sec-head__eye { color: var(--amber); }
.sec-head--light .sec-head__title { color: var(--cream); }
.sec-head--light .sec-head__lead { color: oklch(1 0 0 / 0.8); }
.grad-text { background: linear-gradient(100deg, var(--magenta), var(--coral) 55%, var(--amber)); -webkit-background-clip: text; background-clip: text; color: transparent; }

/* ---------------- VERTICALES ---------------- */
.vert { padding: clamp(70px, 9vw, 120px) 0; position: relative; overflow: hidden;
  background:
    radial-gradient(120% 80% at 85% 0%, oklch(0.95 0.045 350 / 0.7), transparent 55%),
    radial-gradient(110% 90% at 0% 100%, oklch(0.94 0.05 305 / 0.6), transparent 55%),
    linear-gradient(180deg, var(--cream), oklch(0.97 0.022 340)); }
.vert__flora { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.vert > .wrap { position: relative; z-index: 1; }
.vert__grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.vcard {
  display: flex; flex-direction: column; gap: 8px;
  padding: 30px 28px; border-radius: var(--radius);
  background: #fff; border: 1px solid var(--line);
  transition: transform .4s var(--ease), box-shadow .4s var(--ease), border-color .4s var(--ease);
  position: relative; overflow: hidden;
}
.vcard::after { content: ''; position: absolute; inset: auto -40% -60% auto; width: 70%; aspect-ratio: 1; border-radius: 50%; background: var(--sunset); opacity: 0; transition: opacity .4s var(--ease); filter: blur(20px); }
.vcard:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); border-color: transparent; }
.vcard:hover::after { opacity: .14; }
.vcard__icon { display: inline-grid; place-items: center; width: 54px; height: 54px; border-radius: 16px; background: linear-gradient(135deg, oklch(0.62 0.21 350 / 0.14), oklch(0.80 0.15 70 / 0.18)); color: var(--magenta); margin-bottom: 6px; transition: background .4s, color .4s; }
.vcard:hover .vcard__icon { background: var(--sunset); color: var(--cream); }
.vcard__title { font-size: 1.32rem; }
.vcard__desc { color: var(--mute); font-size: 0.98rem; flex: 1; }
.vcard__go { font-weight: 700; color: var(--purple); font-size: 0.95rem; margin-top: 8px; transition: transform .3s var(--ease); }
.vcard:hover .vcard__go { transform: translateX(4px); }

/* ---------------- DASHBOARD ---------------- */
.dash { padding: clamp(70px, 9vw, 120px) 0; background: var(--ink); color: var(--cream); position: relative; overflow: hidden; }
.dash::before { content: ''; position: absolute; inset: auto -10% -30% -10%; height: 60%; background: radial-gradient(50% 100% at 50% 100%, oklch(0.50 0.15 300 / 0.5), transparent 70%); }
.dash__grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 22px; position: relative; }
.panel { background: oklch(0.27 0.04 312); border: 1px solid oklch(1 0 0 / 0.08); border-radius: var(--radius); padding: 28px; }
.panel__head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.panel__head h3 { font-size: 1.18rem; }
.panel__tag { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--amber); background: oklch(0.80 0.15 70 / 0.14); padding: 4px 10px; border-radius: 100px; }

.bars { display: flex; flex-direction: column; gap: 16px; }
.bar { display: grid; grid-template-columns: 130px 1fr 34px; align-items: center; gap: 12px; font-size: 0.92rem; }
.bar__label { color: oklch(1 0 0 / 0.85); font-weight: 600; }
.bar__track { height: 12px; border-radius: 100px; background: oklch(1 0 0 / 0.08); overflow: hidden; }
.bar__fill { display: block; height: 100%; border-radius: 100px; width: 0; transition: width 1.1s var(--ease); }
.bar__val { font-family: 'Bricolage Grotesque'; font-weight: 700; text-align: right; }

.donut-row { display: flex; align-items: center; gap: 24px; }
.donut { width: 150px; height: 150px; transform: rotate(-90deg); flex-shrink: 0; }
.legend { list-style: none; display: flex; flex-direction: column; gap: 9px; font-size: 0.95rem; }
.legend li { display: flex; align-items: center; gap: 9px; color: oklch(1 0 0 / 0.85); }
.legend b { margin-left: auto; font-family: 'Bricolage Grotesque'; }
.legend__dot { width: 11px; height: 11px; border-radius: 3px; }

.map-teaser { display: grid; grid-template-columns: 1fr 1.1fr; gap: 40px; align-items: center; margin-top: 22px; background: oklch(0.27 0.04 312); border: 1px solid oklch(1 0 0 / 0.08); border-radius: var(--radius); padding: 40px; position: relative; }
.map-teaser__copy h3 { font-size: 1.8rem; margin: 0.4em 0 0.4em; }
.map-teaser__copy p { color: oklch(1 0 0 / 0.78); margin-bottom: 1.4em; max-width: 34ch; }
.map-teaser__copy .eyebrow { color: var(--amber); }
.map-teaser__viz { position: relative; aspect-ratio: 16/10; border-radius: 18px; overflow: hidden; box-shadow: var(--shadow-md); }
.map-pin { position: absolute; width: 18px; height: 18px; border-radius: 50%; box-shadow: 0 0 0 6px currentColor; opacity: 0.0001; animation: ping 2.4s ease-out infinite; }
.map-pin--a { top: 30%; left: 38%; color: var(--magenta); }
.map-pin--b { top: 58%; left: 60%; color: var(--coral); animation-delay: .8s; }
.map-pin--c { top: 44%; left: 22%; color: var(--amber); animation-delay: 1.5s; }
@keyframes ping { 0% { box-shadow: 0 0 0 0 currentColor; opacity: .5; } 100% { box-shadow: 0 0 0 22px currentColor; opacity: 0; } }

/* ---------------- FOOTER ---------------- */
.footer { background: var(--ink); color: var(--cream); }
.cta-band { background: var(--sunset); position: relative; overflow: hidden; }
.cta-band__inner { text-align: center; padding: clamp(64px, 9vw, 110px) 0 130px; position: relative; }
.cta-band__title { font-size: clamp(2.4rem, 6vw, 4.4rem); color: var(--cream); }
.cta-band__title .grad-text { background: linear-gradient(100deg, var(--grape), var(--ink)); -webkit-background-clip: text; background-clip: text; }
.cta-band__lead { font-size: 1.2rem; color: oklch(1 0 0 / 0.9); margin: 0.7em auto 1.6em; max-width: 40ch; }
.cta-band__btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.cta-band__btns .btn-ghost { border-color: oklch(0.21 0.035 312 / 0.4); color: var(--ink); background: oklch(1 0 0 / 0.2); }
.cta-band__aqueduct { position: absolute; left: 0; right: 0; bottom: 0; height: 60px; }

.footer__main { display: grid; grid-template-columns: 2fr 1fr 1.4fr; gap: 40px; padding: 70px 0 40px; }
.footer__logos { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; margin-bottom: 16px; }
.footer__logo { width: 34px; height: 36px; object-fit: contain; filter: brightness(0) invert(1); }
.footer__sep { width: 1px; height: 30px; background: oklch(1 0 0 / 0.2); }
.footer__orglogo { height: 50px; display: flex; align-items: center; justify-content: center; padding: 7px 12px; border-radius: 12px; background: oklch(1 0 0 / 0.95); box-shadow: var(--shadow-sm); }
.footer__orgimg { height: 100%; width: auto; object-fit: contain; display: block; }
.footer__orglogo--ijum { padding: 6px 12px; background: var(--grape); }
.footer__orglogo--ila { padding: 8px 14px; transition: transform .3s var(--ease), box-shadow .3s var(--ease); }
.footer__orglogo--ila:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.footer__orglogo--wide { width: 132px; }
.footer__orglogo image-slot { --slot-bg: oklch(1 0 0 / 0.92); }
.footer__desc { color: oklch(1 0 0 / 0.62); max-width: 44ch; font-size: 0.96rem; }
.footer__nav, .footer__contact { display: flex; flex-direction: column; gap: 10px; }
.footer h4 { font-family: 'Hanken Grotesk'; font-weight: 800; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--amber); margin-bottom: 4px; }
.footer__nav a, .footer__contact a { color: oklch(1 0 0 / 0.78); font-size: 0.96rem; transition: color .25s; }
.footer__nav a:hover, .footer__contact a:hover { color: var(--cream); }
.footer__priv { color: oklch(1 0 0 / 0.5); font-size: 0.82rem; margin-top: 8px; line-height: 1.5; }
.footer__bottom { display: flex; justify-content: space-between; padding: 22px 0 40px; border-top: 1px solid oklch(1 0 0 / 0.1); font-size: 0.84rem; color: oklch(1 0 0 / 0.5); }

/* ---------------- RESPONSIVE ---------------- */
@media (max-width: 980px) {
  .hero__grid { grid-template-columns: 1fr; }
  .hero__media { max-width: 460px; margin-top: 30px; }
  .dash__grid { grid-template-columns: 1fr; }
  .map-teaser { grid-template-columns: 1fr; padding: 28px; }
  .footer__main { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 760px) {
  .nav__links { position: fixed; inset: 76px 0 auto 0; flex-direction: column; gap: 18px; background: oklch(0.985 0.012 70 / 0.97); backdrop-filter: blur(14px); padding: 28px; transform: translateY(-120%); transition: transform .4s var(--ease); box-shadow: var(--shadow-md); }
  .nav__links--open { transform: none; }
  .nav__links > a { color: var(--ink) !important; }
  .nav__burger { display: flex; }
  .vert__grid { grid-template-columns: 1fr; }
  .hero__stats { grid-template-columns: repeat(2, 1fr); gap: 22px; }
  .bar { grid-template-columns: 96px 1fr 30px; }
  .footer__main { grid-template-columns: 1fr; }
  .footer__bottom { flex-direction: column; gap: 6px; }
}

  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script>
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)
/* BEGIN USAGE */
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */
/* END USAGE */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.
      this._img.addEventListener('load', () => this._applyView());
      // Gated on editable + fit=cover so share links and contain/fill slots
      // stay static.
      this.addEventListener('dblclick', (e) => {
        if (!this.hasAttribute('data-editable') || !this._reframes()) return;
        e.preventDefault();
        if (this.hasAttribute('data-reframe')) this._exitReframe(true);
        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown
      // drives an aspect-locked resize anchored at the opposite corner; any
      // other pointerdown on the spill pans. Offsets are frame-% so a
      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;

            this._applyView();
          };

        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };

        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);
      });

      // zooms toward the cursor (offset' = cursor·(1-k) + offset·k).
      this.addEventListener('wheel', (e) => {
        if (!this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        const r = this.getBoundingClientRect();
        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;
        this._view.s = next;
        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;

    }

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.
      if (!this.id && !ImageSlot._warned) {
        ImageSlot._warned = true;
        console.warn('<image-slot> without an id will not persist its dropped image.');
      }
      this.addEventListener('dragenter', this);
      this.addEventListener('dragover', this);
      this.addEventListener('dragleave', this);
      this.addEventListener('drop', this);
      subs.add(this._subFn);
      // width%/height% in _applyView encode the frame aspect at call time —
      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()
      // re-seeds _view from stored before clamp/apply, so a shrink→grow
      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());
      this._ro.observe(this);

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }
      this._exitReframe(false);
    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';

        // so hovering the icon inside the empty state doesn't flicker.

      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();

        this.removeAttribute('data-over');

      }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

/* ─── Sparkle (brilla motif) ─── */

/* ─── Aqueduct (viceregal motif) ─── */
function Aqueduct({ arches = 16, style = {} }) {
  const w = 100, archW = w / arches, pierW = archW * 0.28, span = archW - pierW;
  const segs = [];
  for (let i = 0; i < arches; i++) {
    const x = i * archW;
    segs.push('M' + x + ' 40 V18');
    segs.push('M' + x + ' 18 q' + (span / 2) + ' -14 ' + span + ' 0');
  }
  segs.push('M' + (arches * archW) + ' 40 V18');
  return (
    <svg viewBox={'0 0 ' + (arches * archW) + ' 42'} preserveAspectRatio="none" style={style} aria-hidden="true">
      <path d={segs.join(' ')} fill="none" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" vectorEffect="non-scaling-stroke" />
      <path d={'M0 40 H' + (arches * archW)} fill="none" stroke="currentColor" strokeWidth="1.6" vectorEffect="non-scaling-stroke" />
      <path d={'M0 4 H' + (arches * archW)} fill="none" stroke="currentColor" strokeWidth="1.6" vectorEffect="non-scaling-stroke" opacity="0.6" />
    </svg>
  );
}

/* ─── Camelia / Camelina blossom (flor representativa de Morelia) ─── */
function Camellia({ size = 220, style = {} }) {
  const layer = (count, ry, cy, rx, rot0, key) =>
    Array.from({ length: count }).map((_, i) => {
      const ang = rot0 + (360 / count) * i;
      return (
        <ellipse key={key + '-' + i} cx="110" cy={cy} rx={rx} ry={ry}
          transform={'rotate(' + ang + ' 110 110)'} />

    });

    <svg width={size} height={size} viewBox="0 0 220 220" style={style} aria-hidden="true">
      <g fill="currentColor">
        {layer(8, 56, 54, 27, 0, 'o')}
        {layer(8, 42, 72, 20, 22.5, 'm')}
        {layer(6, 28, 88, 14, 12, 'i')}
        <circle cx="110" cy="110" r="13" />
      </g>
    </svg>
  );
}

/* ─── NAV ─── */
function Nav() {

/* ─── COUNT-UP ─── */
function CountUp({ to, dur = 1900, start = false }) {
  const [val, setVal] = useState(0);
  const raf = useRef(0);
  useEffect(() => {
    if (!start) return;
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduce) { setVal(to); return; }
    const t0 = performance.now();
    const tick = (now) => {
      const p = Math.min(1, (now - t0) / dur);
      const eased = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(eased * to));
      if (p < 1) raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    const safety = setTimeout(() => setVal(to), dur + 400);
    return () => { cancelAnimationFrame(raf.current); clearTimeout(safety); };
  }, [start, to]);
  return <>{val.toLocaleString('es-MX')}</>;
}

/* ─── LIVE STATS ─── */
function LiveStats() {
  const secRef = useRef(null);
  const [seen, setSeen] = useState(false);
  useEffect(() => {
    if (!secRef.current) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setSeen(true); io.disconnect(); }
    }, { threshold: 0.25 });
    io.observe(secRef.current);
    const safety = setTimeout(() => setSeen(true), 2800);
    return () => { io.disconnect(); clearTimeout(safety); };
  }, []);

  const urgency = [
    { t:'Seguridad',     v:86, c:'var(--magenta)' },
    { t:'Empleabilidad', v:78, c:'var(--coral)' },
    { t:'Urbanismo',     v:64, c:'var(--purple)' },
    { t:'Salud',         v:57, c:'var(--amber)' },
    { t:'Educación',     v:49, c:'var(--grape)' },
  ];
  const zones = [
    { t:'Centro',   v:28 }, { t:'Norte',   v:22 }, { t:'Sur',     v:19 },
    { t:'Poniente', v:17 }, { t:'Oriente', v:14 },
  ];
  const zCols = ['var(--magenta)','var(--coral)','var(--amber)','var(--purple)','var(--grape)'];

  return (
    <section className="dash" id="dashboard" ref={secRef}>
      <div className="wrap">
        <div className="sec-head sec-head--light">
          <span className="eyebrow sec-head__eye"><span className="live-dot"></span> Dashboard en tiempo real</span>
          <h2 className="sec-head__title">Los datos que <span className="grad-text">tú generas</span>, abiertos a todos</h2>
          <p className="sec-head__lead">Transparencia total: cada participación se refleja al instante. Así se ve la urgencia ciudadana hoy.</p>
        </div>

        <div className="dash__grid">
          <div className="panel">
            <div className="panel__head">
              <h3>Urgencia promedio por vertical</h3>
              <span className="panel__tag">Municipal</span>
            </div>
            <div className="bars">
              {urgency.map((u, i) => (
                <div className="bar" key={u.t}>
                  <span className="bar__label">{u.t}</span>
                  <span className="bar__track">
                    <span className="bar__fill" style={{ width: seen ? u.v + '%' : 0, background: u.c, transitionDelay: i * 0.1 + 's' }} />
                  </span>
                  <span className="bar__val">{u.v}</span>
                </div>
              ))}
            </div>
          </div>

          <div className="panel">
            <div className="panel__head">
              <h3>Respuestas por zona</h3>
              <span className="panel__tag">%</span>
            </div>
            <div className="donut-row">
              <svg viewBox="0 0 42 42" className="donut">
                {(() => {
                  let acc = 0;
                  return zones.map((z, i) => {
                    const dash = seen ? z.v : 0;
                    const el = (
                      <circle key={z.t} cx="21" cy="21" r="15.9155" fill="none"
                        stroke={zCols[i]} strokeWidth="6"
                        strokeDasharray={dash + ' ' + (100 - dash)}
                        strokeDashoffset={25 - acc}
                        style={{ transition: 'stroke-dasharray 1s var(--ease)', transitionDelay: i * 0.12 + 's' }} />
                    );
                    acc += z.v;
                    return el;
                  });
                })()}
              </svg>
              <ul className="legend">
                {zones.map((z, i) => (
                  <li key={z.t}>
                    <span className="legend__dot" style={{ background: zCols[i] }} />
                    {z.t} <b>{z.v}%</b>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        </div>

        <div className="map-teaser reveal" id="mapa">
          <div className="map-teaser__copy">
            <span className="eyebrow"><Sparkle size={15} color="var(--amber)" /> Mapa de calor</span>
            <h3>Explora Morelia colonia por colonia</h3>
            <p>Visualiza dónde se concentra cada problemática y qué zonas necesitan atención urgente.</p>
            <a className="btn btn-sun" href="https://ilatacc.github.io/vozjoven/" target="_blank" rel="noopener noreferrer">
              <Sparkle size={16} color="var(--grape)" /> Abrir mapa de calor

          </div>
          <div className="map-teaser__viz">
            <img src={PHOTO_MAP} alt="Mapa de calor de Morelia" className="hero__img" />

            <span className="map-pin map-pin--b"></span>
            <span className="map-pin map-pin--c"></span>
          </div>
        </div>
      </div>
    </section>
  );
}

/* ─── APP ─── */
function App() {
  useEffect(() => {
    const reveal = (el) => el.classList.add('in');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { reveal(e.target); io.unobserve(e.target); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });
    document.querySelectorAll('.reveal:not(.in)').forEach((el) => io.observe(el));
    const safety = setTimeout(() => {
      document.querySelectorAll('.reveal:not(.in)').forEach(reveal);
    }, 1800);
    return () => { io.disconnect(); clearTimeout(safety); };
  }, []);

  return (
    <>
      <Nav />
      <main>
        <Hero />
        <Verticales />
        <LiveStats />
      </main>
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
